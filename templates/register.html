{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm p-4">
            <h3 class="text-center mb-4">Resgístrate</h3>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Contraseña" required>
                </div>
                <button class="btn btn-primary btn-lg w-100">Regístrar</button>
            </form>
            <hr>
            <div class="text-center">
                <a href="/login" class="text-decoration-none">¿Tienes cuenta? Ingresa</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

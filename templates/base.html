<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Línea CRÍTICA para que funcione en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Red Social Responsiva</title>
    <style>
        body { background-color: #f0f2f5; }
        .navbar-brand { font-weight: bold; }
        /* Ajuste para que los botones no se peguen al borde en móvil */
        .container { padding-left: 15px; padding-right: 15px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">RedSocial</a>
            
            {% if current_user.is_authenticated %}
            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-2 d-none d-sm-inline">
                    {{ current_user.username }}
                </span>
                <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Salir</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
